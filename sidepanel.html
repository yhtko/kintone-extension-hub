<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>kintone Base Launcher</title>
  <link rel="stylesheet" href="launcher.css" />
</head>
<body class="launcher">
  <div class="launcher-shell">
    <header class="launcher-head">
      <div class="launcher-title">
        <span class="launcher-name">kintone Base</span>
        <span class="launcher-tag">Launcher</span>
      </div>
      <div class="launcher-head-actions">
        <button id="quickAdd" class="icon-btn" title="現在のkintoneビューを登録">＋</button>
        <button id="openOptions" class="icon-btn" title="設定を開く">⚙</button>
      </div>
    </header>

    <section id="shortcutPanel" class="shortcut-panel" aria-label="ショートカット">
      <div class="shortcut-head">
        <span class="shortcut-label">ショートカット</span>
        <button id="toggleShortcuts" class="icon-btn small" type="button" aria-pressed="true" title="ショートカットの表示/非表示を切り替え">━</button>
      </div>
      <div id="shortcutRow" class="shortcut-row" role="toolbar" aria-label="ショートカット一覧"></div>
    </section>

    <section class="filter-panel" aria-label="検索">
      <label class="sr-only" for="filter">検索</label>
      <div class="filter-field">
        <span class="filter-icon">🔍</span>
        <input id="filter" type="search" placeholder="検索（ラベル / URL / ホスト）" autocomplete="off" />
        <button id="clearFilter" class="icon-btn small" aria-label="検索文字列をクリア">×</button>
      </div>
      <div class="filter-actions">
        <label class="toggle">
          <input type="checkbox" id="togglePinsOnly" />
          <span>ピンだけ表示</span>
        </label>
        <button id="refreshCounts" class="ghost-btn" title="件数を更新">↻ 件数</button>
      </div>
    </section>

    <div id="notice" class="launcher-notice hidden" role="status"></div>

    <div class="lists-scroll" id="listsScroll">
      <section id="pinSection" class="list-section" aria-label="ピン留め">
        <div class="section-head">
          <span class="section-label">📁 ピン留め</span>
        </div>
        <ul id="pinList" class="entry-list" aria-live="polite"></ul>
      </section>

      <section id="favSection" class="list-section" aria-label="ウォッチリスト">
        <div class="section-head">
          <span class="section-label">ウォッチリスト</span>
        </div>
        <div id="favCategories" class="category-stack" aria-live="polite"></div>
      </section>
    </div>
  </div>

  <div id="menuLayer" class="menu-layer hidden" role="menu"></div>

  <script type="module" src="launcher.js"></script>
</body>
</html>
