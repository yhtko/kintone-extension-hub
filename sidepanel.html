<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>kintone Base Launcher</title>
  <link rel="stylesheet" href="launcher.css" />
</head>
<body class="launcher">
  <div class="launcher-shell">
    <header class="launcher-head">
      <div class="launcher-title">
        <span class="launcher-name">kintone Base</span>
        <span class="launcher-tag">Launcher</span>
      </div>
      <div class="launcher-head-actions">
        <button id="toggleFilterPanel" class="icon-btn small" type="button" aria-pressed="false" title="検索を表示/非表示" aria-label="検索を表示/非表示">🔍</button>
        <button id="openOptions" class="icon-btn small" type="button" title="設定を開く" aria-label="設定を開く">⚙</button>
      </div>
    </header>

    <section id="shortcutPanel" class="shortcut-panel" aria-label="ショートカット">
      <section id="filterPanel" class="filter-panel hidden" aria-label="検索">
        <label class="sr-only" for="filter">検索</label>
        <div class="filter-field">
          <span class="filter-icon" aria-hidden="true">🔎</span>
          <input id="filter" type="search" placeholder="検索（ラベル / URL / ホスト）" autocomplete="off" />
          <button id="clearFilter" class="icon-btn small" type="button" aria-label="検索をクリア" title="検索をクリア">✕</button>
        </div>
      </section>

      <div class="shortcut-head">
        <span class="shortcut-label">ショートカット</span>
        <div class="section-actions section-actions-icons">
          <button id="toggleShortcuts" class="icon-btn small" type="button" aria-pressed="true" title="ショートカットの表示/非表示を切り替え" aria-label="ショートカットの表示/非表示を切り替え">▾</button>
        </div>
      </div>
      <div id="shortcutRow" class="shortcut-row" role="toolbar" aria-label="ショートカット一覧"></div>
    </section>

    <div id="notice" class="launcher-notice hidden" role="status"></div>

    <div class="lists-scroll" id="listsScroll">
      <section id="pinSection" class="list-section" aria-label="ウォッチリスト（ピン）">
        <div class="section-head">
          <span class="section-label">📌 ウォッチリスト（ピン）</span>
        </div>
        <ul id="pinnedWatchList" class="entry-list" aria-live="polite"></ul>
      </section>

      <section id="favSection" class="list-section" aria-label="ウォッチリスト">
        <div class="section-head">
          <span class="section-label">
            <span class="section-ico" aria-hidden="true">🔖</span>
            <span>ウォッチリスト</span>
          </span>
          <div class="section-actions section-actions-icons">
            <button id="quickAdd" class="icon-btn small" type="button" title="現在のkintoneビューを追加" aria-label="現在のkintoneビューを追加">＋</button>
            <button id="refreshCounts" class="icon-btn small" type="button" title="件数を更新" aria-label="件数を更新">↻</button>
            <label class="icon-toggle pins-only-toggle" title="ウォッチリストを折りたたむ/展開" aria-label="ウォッチリストを折りたたむ/展開">
              <input type="checkbox" id="togglePinsOnly" />
              <span id="togglePinsOnlyIcon" class="icon-btn small" aria-hidden="true">▾</span>
            </label>
          </div>
        </div>
        <div id="favCategories" class="category-stack" aria-live="polite"></div>
      </section>

      <section id="recordPinSection" class="list-section" aria-label="レコードピン">
        <div class="section-head">
          <span class="section-label">🧷 レコードピン</span>
          <div class="section-actions section-actions-icons">
            <button id="addPinFromTab" class="icon-btn small" type="button" title="現在のレコードをピン留め" aria-label="現在のレコードをピン留め">＋</button>
            <button id="refreshPins" class="icon-btn small" type="button" title="ピンを更新" aria-label="ピンを更新">↻</button>
            <button id="toggleRecordPins" class="icon-btn small" type="button" aria-pressed="false" title="レコードピンを折りたたむ/展開" aria-label="レコードピンを折りたたむ/展開">▾</button>
          </div>
        </div>
        <div id="pinNotice" class="pin-notice hidden" role="status"></div>
        <ul id="pinList" class="pin-cards" aria-live="polite"></ul>
      </section>

      <section id="recentSection" class="list-section hidden" aria-label="最近のレコード">
        <div class="section-head">
          <span class="section-label">
            <span class="section-ico" aria-hidden="true">🕘</span>
            <span>最近のレコード</span>
          </span>
          <button id="recentClear" class="icon-btn small" type="button" title="履歴をクリア" aria-label="履歴をクリア">✕</button>
        </div>
        <ul id="recentList" class="recent-list" aria-live="polite"></ul>
      </section>
    </div>
  </div>

  <script src="./vendor/lucide.umd.js"></script>
  <script type="module" src="launcher.js"></script>
</body>
</html>
